<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hash Test</title>
</head>
<body>
    <h1>测试 Hash 跳转</h1>
    <p id="status">检测中...</p>
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            const hash = window.location.hash;
            document.getElementById('status').textContent = 
                'Hash: ' + (hash || '(无)') + 
                '\n匹配 #activate: ' + (hash === '#activate') +
                '\n匹配 #activation: ' + (hash === '#activation');
        });
    </script>
    
    <hr>
    <p>测试链接：</p>
    <a href="#activate">带 #activate</a> |
    <a href="#activation">带 #activation</a> |
    <a href="">不带 hash</a>
</body>
</html>
